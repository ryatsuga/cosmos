{% extends "website/base.html" %}
{% load crispy_forms_tags %}
{% block content %}

<div class="d-flex justify-content-center">
	<div class="content-section" style="width: 700px; margin-top: 20px;">
		<form method="POST">
			{% csrf_token %}
			<fieldset class="form-group">
				<legend class="border_bottom mb-4">Complete os dados abaixo para ativar seu negócio:</legend>
				{{ form|crispy }}					
			</fieldset>
			<div class="form-group">
				<button class="btn btn-info btn-circle" type='submit'>Ativar</button>
			</div>
		</form>
		</div>
	</div>
</div>
{% endblock content %}
